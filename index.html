<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Cito Apotek Batch Label</title>

<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>

<style>

*{
box-sizing:border-box;
}

body{
font-family:Segoe UI,Arial,sans-serif;
background:#f2f2f2;
margin:20px;
}

.panel{

background:#fff;

padding:20px;

border-radius:15px;

box-shadow:0 3px 12px rgba(0,0,0,.1);

margin-bottom:20px;

}

h2{
margin-top:0;
}

textarea{

width:100%;

height:220px;

padding:12px;

font-family:Consolas,monospace;

font-size:14px;

border-radius:10px;

border:1px solid #ccc;

}

.info{

margin-top:10px;

font-weight:bold;

color:#0aa53f;

}

button{

padding:12px 18px;

border:none;

border-radius:10px;

cursor:pointer;

font-weight:bold;

margin-top:10px;

margin-right:10px;

}

.generate{
background:#0aa53f;
color:white;
}

.print{
background:#1565ff;
color:white;
}

.clear{
background:#888;
color:white;
}

/* LABEL AREA */

.labels{

display:flex;

flex-wrap:wrap;

gap:4px;

}

/* LABEL */

.label{

width:58mm;
height:39mm;

background:white;

border:1px solid #ddd;

padding:2mm;

overflow:hidden;

page-break-inside:avoid;

}

/* HEADER */

.top{

display:flex;

align-items:flex-start;

gap:4px;

}

.logo{

width:7mm;
height:7mm;

object-fit:contain;

flex-shrink:0;

}

.nama{

font-size:9pt;

font-weight:900;

line-height:1.05;

height:9mm;

overflow:hidden;

display:-webkit-box;

-webkit-line-clamp:2;

-webkit-box-orient:vertical;

}

/* PRICE */

.sebelum{

font-size:6pt;

text-align:center;

color:#666;

margin-top:1mm;

}

.sesudah{

font-size:15pt;

font-weight:900;

text-align:center;

color:#ff7a00;

line-height:1;

margin-top:1mm;

}

/* BARCODE */

.barcode{

display:flex;

justify-content:center;

align-items:center;

height:14mm;

margin-top:1mm;

overflow:hidden;

}

.barcode svg{
max-width:100%;
}

/* PRINT */

@media print{

body{
margin:0;
padding:0;
background:white;
}

.panel{
display:none;
}

.labels{
display:block;
}

.label{

width:58mm;
height:39mm;

margin:0;

border:none;

page-break-after:always;

}

}

@page{
size:58mm 39mm;
margin:0;
}

</style>
</head>

<body>

<div class="panel">

<h2>Cito Apotek - Batch Price Card</h2>

<p>
Format:
<br>
Nama Barang;Harga Sebelum PPN;SKU
</p>

<textarea id="data"></textarea>

<div class="info" id="counter">
Total Label : 0
</div>

<button class="generate" onclick="generateLabels()">
GENERATE
</button>

<button class="print" onclick="window.print()">
PRINT
</button>

<button class="clear" onclick="clearData()">
CLEAR
</button>

</div>

<div class="labels" id="labels"></div>

<script>

function rupiah(x){
return x.toLocaleString('id-ID');
}

function clearData(){

document.getElementById('data').value='';

document.getElementById('labels').innerHTML='';

document.getElementById('counter').innerText=
'Total Label : 0';

}

function generateLabels(){

const data=
document.getElementById('data')
.value
.trim();

if(!data){
return;
}

const rows=
data.split('\n');

let html='';

let totalLabel=0;

rows.forEach((row,index)=>{

if(!row.trim()) return;

const col=
row.split(';');

if(col.length<3) return;

const nama=
col[0].trim();

const harga=
parseFloat(
col[1]
.replace(/\./g,'')
.replace(/,/g,'')
);

const sku=
col[2].trim();

if(!sku) return;

const hargaPPN=
Math.round(harga*1.11);

html+=`

<div class="label">

<div class="top">

<img src="logo.png" class="logo">

<div class="nama">
${nama}
</div>

</div>

<div class="sebelum">
Harga Sebelum PPN : Rp ${rupiah(harga)}
</div>

<div class="sesudah">
Rp ${rupiah(hargaPPN)}
</div>

<div class="barcode">
<svg id="bc${index}"></svg>
</div>

</div>

`;

totalLabel++;

});

document.getElementById(
'labels'
).innerHTML=html;

document.getElementById(
'counter'
).innerText=
'Total Label : ' + totalLabel;

rows.forEach((row,index)=>{

const col=
row.split(';');

if(col.length<3) return;

const sku=
col[2].trim();

if(!sku) return;

JsBarcode(
`#bc${index}`,
sku,
{
format:"CODE128",

width:1.3,

height:28,

displayValue:true,

fontSize:8,

textMargin:1,

margin:0,

lineColor:"#000"
}
);

});

}

</script>

</body>
</html>
