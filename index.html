<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Cito Apotek Batch Label Thermal</title>

<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>

<style>

*{
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:20px;
}

.panel{

background:white;

padding:20px;

border-radius:12px;

box-shadow:0 2px 10px rgba(0,0,0,.1);

margin-bottom:20px;

}

textarea{

width:100%;

height:250px;

padding:12px;

font-family:Consolas,monospace;

font-size:14px;

}

button{

padding:12px 20px;

border:none;

border-radius:8px;

cursor:pointer;

font-weight:bold;

margin-right:10px;

margin-top:10px;

}

.generate{
background:#0aa53f;
color:white;
}

.print{
background:#1565ff;
color:white;
}

.clear{
background:#777;
color:white;
}

.info{

margin-top:10px;

font-weight:bold;

color:#0aa53f;

}

/* LABEL AREA */

.labels{

width:58mm;

margin:auto;

}

/* LABEL */

.label{

width:58mm;

padding:2mm;

border-bottom:1px dashed #ccc;

background:white;

overflow:hidden;

}

/* TOP */

.top{

display:flex;

align-items:center;

gap:4px;

}

.logo{

width:7mm;
height:7mm;

object-fit:contain;

flex-shrink:0;

}

.nama{

font-size:9pt;

font-weight:bold;

line-height:1.1;

word-break:break-word;

}

/* PRICE */

.sebelum{

font-size:6pt;

color:#666;

text-align:center;

margin-top:1mm;

}

.sesudah{

font-size:16pt;

font-weight:900;

color:#000;

line-height:1;

text-align:center;

margin-top:1mm;

}

/* BARCODE */

.barcode{

display:flex;

justify-content:center;

margin-top:2mm;

}

.barcode svg{

max-width:100%;

}

/* PRINT */

@media print{

body{
margin:0;
padding:0;
background:white;
}

.panel{
display:none;
}

.labels{

width:58mm;

}

.label{

width:58mm;

border:none;

page-break-inside:avoid;

}

}

@page{

size:58mm auto;

margin:0;

}

</style>
</head>

<body>

<div class="panel">

<h2>Cito Apotek Thermal Label</h2>

<p>

Format:

<br><br>

Nama Barang;Harga Sebelum PPN;SKU

</p>

<textarea id="data">

PARACETAMOL 500MG;10000;PAR500001
AMOXICILLIN 500MG;25000;AMX500001

</textarea>

<br>

<button
class="generate"
onclick="generateLabels()">

GENERATE

</button>

<button
class="print"
onclick="window.print()">

PRINT

</button>

<button
class="clear"
onclick="clearData()">

CLEAR

</button>

<div
class="info"
id="counter">

Total Label : 0

</div>

</div>

<div
class="labels"
id="labels">

</div>

<script>

function rupiah(x){

return x.toLocaleString('id-ID');

}

function clearData(){

document.getElementById(
'data'
).value='';

document.getElementById(
'labels'
).innerHTML='';

document.getElementById(
'counter'
).innerText=
'Total Label : 0';

}

function generateLabels(){

const data=
document.getElementById(
'data'
).value.trim();

if(!data)return;

const rows=
data.split('\n');

let html='';

let total=0;

rows.forEach((row,index)=>{

if(!row.trim()) return;

const col=
row.split(';');

if(col.length<3) return;

const nama=
col[0].trim();

const harga=
parseFloat(
col[1]
.replace(/\./g,'')
.replace(/,/g,'')
);

const sku=
col[2].trim();

if(!sku) return;

const hargaPPN=
Math.round(
harga*1.11
);

html+=`

<div class="label">

<div class="top">

<img
src="logo.png"
class="logo">

<div class="nama">

${nama}

</div>

</div>

<div class="sebelum">

Harga Sebelum PPN
Rp ${rupiah(harga)}

</div>

<div class="sesudah">

Rp ${rupiah(hargaPPN)}

</div>

<div class="barcode">

<svg id="bc${index}"></svg>

</div>

</div>

`;

total++;

});

document.getElementById(
'labels'
).innerHTML=html;

document.getElementById(
'counter'
).innerText=
'Total Label : '+total;

rows.forEach((row,index)=>{

const col=
row.split(';');

if(col.length<3) return;

const sku=
col[2].trim();

if(!sku) return;

JsBarcode(
`#bc${index}`,
sku,
{

format:"CODE128",

width:1.3,

height:30,

displayValue:true,

fontSize:10,

margin:0,

textMargin:2

}

);

});

}

generateLabels();

</script>

</body>
</html>
