<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">

<title>Cito Apotek Batch Price Card</title>

<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>

<style>

*{
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
margin:20px;
background:#f5f5f5;
}

.panel{

background:white;

padding:20px;

border-radius:15px;

box-shadow:0 2px 10px rgba(0,0,0,.1);

margin-bottom:20px;

}

textarea{

width:100%;

height:250px;

padding:12px;

font-family:Consolas,monospace;

}

button{

padding:12px 20px;

border:none;

cursor:pointer;

font-weight:bold;

border-radius:8px;

margin-top:10px;

margin-right:10px;

}

.generate{

background:#0aa53f;

color:white;

}

.print{

background:#1565ff;

color:white;

}

/* LABEL */

.labels{

display:flex;

flex-wrap:wrap;

gap:0;

}

.label{

width:58mm;
height:39mm;

border:1px solid #ddd;

background:white;

padding:2mm;

overflow:hidden;

page-break-inside:avoid;

}

.top{

display:flex;

align-items:center;

gap:4px;

}

.logo{

width:7mm;
height:7mm;

object-fit:contain;

flex-shrink:0;

}

.nama{

font-size:9pt;

font-weight:bold;

line-height:1;

height:8mm;

overflow:hidden;

}

.sebelum{

font-size:6pt;

color:#555;

margin-top:1mm;

text-align:center;

}

.sesudah{

font-size:16pt;

font-weight:900;

color:#ff7a00;

line-height:1;

text-align:center;

margin-top:1mm;

}

.barcode{

height:13mm;

display:flex;

justify-content:center;

align-items:center;

overflow:hidden;

margin-top:1mm;

}

.barcode svg{

max-width:100%;

}

@media print{

body{
margin:0;
padding:0;
background:white;
}

.panel{
display:none;
}

.labels{
display:block;
}

.label{

width:58mm;
height:39mm;

margin:0;

border:none;

page-break-after:always;

}

}

@page{

size:58mm 39mm;

margin:0;

}

</style>
</head>

<body>

<div class="panel">

<h2>Cito Apotek - Batch Label</h2>

<p>
Paste dari Excel:
<br>
Nama Barang | Harga Sebelum PPN | SKU
</p>

<textarea id="data"></textarea>

<br>

<button
class="generate"
onclick="generateLabels()">

GENERATE LABEL

</button>

<button
class="print"
onclick="window.print()">

PRINT

</button>

</div>

<div
class="labels"
id="labels">

</div>

<script>

function rupiah(x){

return x.toLocaleString('id-ID');

}

function generateLabels(){

let data=
document.getElementById(
'data'
).value.trim();

let rows=
data.split('\n');

let html='';

rows.forEach((row,index)=>{

let col=
row.split('\t');

if(col.length<3)return;

let nama=
col[0].trim();

let harga=
parseFloat(
col[1]
.replace(/\./g,'')
.replace(/,/g,'')
);

let sku=
col[2].trim();

let total=
Math.round(
harga*1.11
);

html+=`

<div class="label">

<div class="top">

<img
src="logo.png"
class="logo">

<div class="nama">

${nama}

</div>

</div>

<div class="sebelum">

Harga Sebelum PPN
Rp ${rupiah(harga)}

</div>

<div class="sesudah">

Rp ${rupiah(total)}

</div>

<div class="barcode">

<svg id="bc${index}"></svg>

</div>

</div>

`;

});

document.getElementById(
'labels'
).innerHTML=html;

rows.forEach((row,index)=>{

let col=
row.split('\t');

if(col.length<3)return;

let sku=
col[2].trim();

JsBarcode(
`#bc${index}`,
sku,
{

format:"CODE128",

width:1.2,

height:28,

displayValue:true,

fontSize:8,

margin:0

}

);

});

}

</script>

</body>
</html>
